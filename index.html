<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Draw My Walk</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.css" />

  <style>
    body { margin:0; padding:0; font-family: system-ui, sans-serif; background:#111; color:#fff; }
    #map { position:absolute; top:0; bottom:0; left:0; right:0; }
    #controls {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.85);
      padding: 12px 18px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      z-index: 1000;
      text-align: center;
      max-width: 92%;
    }
    button, input[type="range"] {
      font-size: 1.1em;
      padding: 12px 20px;
      margin: 6px;
      border-radius: 12px;
      border: none;
      background: #e00;
      color: white;
      cursor: pointer;
    }
    button:active { background: #c00; }
    #info {
      display: none; /* Hidden by default until a path is drawn */
      position: absolute;
      top: 12px;
      right: 12px;
      left: auto;
      background: rgba(0,0,0,0.85);
      padding: 14px;
      border-radius: 12px;
      font-size: 1.05em;
      z-index: 1000;
      max-width: 260px;
    }
    .leaflet-control { z-index: 999 !important; }
  </style>
</head>
<body>

<div id="map"></div>
<div id="info"></div>

<div id="controls">
  <button id="clearBtn">Clear Path</button>
  <button id="locateBtn">📍 Find Me</button>
  <button id="playBtn">▶️ Start Voice Guidance</button><br>
  <label>Walking speed: <span id="speedVal">4.5</span> km/h</label>
  <input type="range" id="speedSlider" min="2" max="7" step="0.1" value="4.5">
</div>

<audio id="keepAliveAudio" loop playsinline>
  <source src="data:audio/mp3;base64,//NExAAAAANIAAAAAExBTUUzLjEwMKqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqq//NExAAAAANIAAAAAExBTUUzLjEwMKqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqq" type="audio/mpeg">
</audio>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.js"></script>
<script src="https://unpkg.com/@turf/turf@7/turf.min.js"></script>

<script>
// ==================== VARIABLES ====================
const map = L.map('map', { zoomControl: false }).setView([51.5, -0.1], 13);

let currentLayer = null;
let turns = [];
let userMarker = null;
let positionWatchId = null;
let guidanceEnabled = false;
let announcedTurns = new Set();
let currentSpeed = 4.5;
let wakeLock = null;

// ==================== MAP SETUP ====================
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap'
}).addTo(map);

L.control.zoom({ position: 'topright' }).addTo(map);

// Geoman - Simplified Controls
map.pm.addControls({
  position: 'topleft',
  drawMarker: false,
  drawCircleMarker: false,
  drawRectangle: false,
  drawPolygon: false,
  drawCircle: false,
  drawText: false,
  drawPolyline: true,     // Keep line drawing
  editMode: true,         // Keep editing
  dragMode: false,
  removalMode: true,      // Keep deleting
  cutPolygon: false,
  rotateMode: false
});

// Enable snapping so closing loops is easier
map.pm.setGlobalOptions({ snappable: true, snapDistance: 20 });

// ==================== SPEED SLIDER ====================
const speedSlider = document.getElementById('speedSlider');
const speedVal = document.getElementById('speedVal');
speedSlider.addEventListener('input', () => {
  currentSpeed = parseFloat(speedSlider.value);
  speedVal.textContent = currentSpeed.toFixed(1);
  if (currentLayer) updateInfo();
});

// ==================== DRAWING & MEASUREMENT ====================

// Fix: Manually close the loop if the start and end points are very close
function ensureClosedLoop(layer) {
  const latlngs = layer.getLatLngs();
  if (latlngs.length > 2) {
    const first = latlngs[0];
    const last = latlngs[latlngs.length - 1];
    const dist = first.distanceTo(last);
    
    // If they finished drawing within 30 meters of the start point, close it
    if (dist > 0 && dist < 30) {
      latlngs.push(first);
      layer.setLatLngs(latlngs);
    }
  }
}

map.on('pm:create', e => {
  if (currentLayer) map.removeLayer(currentLayer);
  currentLayer = e.layer;
  ensureClosedLoop(currentLayer);
  updateInfo();
  analyzeTurns();
});

map.on('pm:edit', () => {
  if (currentLayer) {
    ensureClosedLoop(currentLayer);
    updateInfo();
    analyzeTurns();
  }
});

function updateInfo() {
  const infoDiv = document.getElementById('info');
  if (!currentLayer) {
    infoDiv.style.display = 'none';
    return;
  }
  
  infoDiv.style.display = 'block';
  const line = turf.lineString(currentLayer.getLatLngs().map(p => [p.lng, p.lat]));
  const km = turf.length(line, { units: 'kilometers' });
  const meters = Math.round(km * 1000);
  const minutes = Math.round((km / currentSpeed) * 60);

  infoDiv.innerHTML = `
    <strong>Path:</strong> ${meters} m (${km.toFixed(2)} km)<br>
    <strong>Time @ ${currentSpeed} km/h:</strong> ${minutes} minutes
  `;
}

function clearExistingPath() {
  if (currentLayer) {
    map.removeLayer(currentLayer);
    currentLayer = null;
  }
  // Reset Geoman state
  map.pm.disableDraw();
  turns = [];
  announcedTurns = new Set();
  updateInfo();
}

// ==================== ENHANCED TURN DETECTION ====================
function analyzeTurns() {
  if (!currentLayer) return;
  const latlngs = currentLayer.getLatLngs();
  if (latlngs.length < 3) return;

  turns = [];
  announcedTurns = new Set();

  // Convert Leaflet latlngs to Turf points
  const points = latlngs.map(p => [p.lng, p.lat]);
  const line = turf.lineString(points);
  
  // Simplify path to remove jitter/small zig-zags
  const simplified = turf.simplify(line, { tolerance: 0.0002, highQuality: true });
  const coords = simplified.geometry.coordinates;

  for (let i = 1; i < coords.length - 1; i++) {
    const bearing1 = turf.bearing(coords[i-1], coords[i]);
    const bearing2 = turf.bearing(coords[i], coords[i+1]);
    let diff = (bearing2 - bearing1 + 540) % 360 - 180;

    if (Math.abs(diff) > 25) { // Lowered threshold for better detection
      const dir = diff > 0 ? 'right' : 'left';
      const intensity = Math.abs(diff) > 70 ? 'sharp' : 'slight';
      turns.push({
        lat: coords[i][1],
        lng: coords[i][0],
        text: `In 50 meters, ${intensity} turn ${dir}`
      });
    }
  }
}

let heartbeatInterval;

function startHeartbeat() {
  stopHeartbeat();
  heartbeatInterval = setInterval(() => {
    if (guidanceEnabled) {
      // Just a tiny volume tweak to keep the audio engine "active"
      keepAliveAudio.volume = keepAliveAudio.volume === 1 ? 0.99 : 1;
    }
  }, 10000); 
}

function stopHeartbeat() {
  clearInterval(heartbeatInterval);
}
  
// ==================== BACKGROUND PROCESS MANAGEMENT ====================
async function requestWakeLock() {
  if ('wakeLock' in navigator) {
    try {
      wakeLock = await navigator.wakeLock.request('screen');
    } catch (err) {
      console.warn('Wake Lock failed:', err);
    }
  }
}

function releaseWakeLock() {
  if (wakeLock !== null) {
    wakeLock.release().then(() => { wakeLock = null; });
  }
}

// ==================== REAL-TIME GPS & VOICE CHECK ====================
function updateUserPosition(pos) {
  const latlng = L.latLng(pos.coords.latitude, pos.coords.longitude);
  if (userMarker) {
    userMarker.setLatLng(latlng);
  } else {
    userMarker = L.marker(latlng, { title: "You are here" }).addTo(map);
  }

  if (guidanceEnabled && turns.length > 0) {
    checkForTurns(pos.coords.latitude, pos.coords.longitude);
  }
}

function checkForTurns(lat, lng) {
  const userPoint = turf.point([lng, lat]);
  for (let i = 0; i < turns.length; i++) {
    if (announcedTurns.has(i)) continue;
    const turn = turns[i];
    const turnPoint = turf.point([turn.lng, turn.lat]);
    const distMeters = turf.distance(userPoint, turnPoint, { units: 'kilometers' }) * 1000;

    if (distMeters <= 60) {
      const u = new SpeechSynthesisUtterance(turn.text);
      u.rate = 1.05;
      speechSynthesis.speak(u);
      announcedTurns.add(i);
    }
  }
}

// ==================== VOICE GUIDANCE BUTTON ====================
const playBtn = document.getElementById('playBtn');
const keepAliveAudio = document.getElementById('keepAliveAudio');

playBtn.addEventListener('click', () => {
  if (!currentLayer) {
    alert("Draw a path first!");
    return;
  }
  if (!userMarker) {
    alert("Location access is required for voice guidance.\n\nIt was requested when you opened the page.");
    return;
  }

  if (guidanceEnabled) {
    guidanceEnabled = false;
    playBtn.textContent = '▶️ Start Voice Guidance';
    stopHeartbeat();
    releaseWakeLock();
    return;
  }

  guidanceEnabled = true;
  playBtn.textContent = '🔇 Stop Voice Guidance';
  
  // Request WakeLock immediately
  await requestWakeLock();
  
  // Start Audio & Heartbeat
  keepAliveAudio.play();
  startHeartbeat();
  
  speechSynthesis.speak(new SpeechSynthesisUtterance("Navigation started. Keep your screen on for best results."));
});

// ==================== OTHER BUTTONS ====================
document.getElementById('clearBtn').addEventListener('click', () => {
  if (currentLayer) {
    map.removeLayer(currentLayer);
    currentLayer = null;
    turns = [];
    announcedTurns = new Set();
    
    // Stop guidance if running
    if (guidanceEnabled) {
      guidanceEnabled = false;
      playBtn.textContent = '▶️ Start Voice Guidance';
      keepAliveAudio.pause();
      releaseWakeLock();
    }
    
    updateInfo(); // This will hide the info box
  }
});

document.getElementById('locateBtn').addEventListener('click', () => {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(pos => {
      map.flyTo([pos.coords.latitude, pos.coords.longitude], 16);
    });
  }
});

// ==================== AUTO REQUEST LOCATION ON PAGE LOAD ====================
if (navigator.geolocation) {
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const latlng = L.latLng(pos.coords.latitude, pos.coords.longitude);
      map.flyTo(latlng, 15);
      userMarker = L.marker(latlng).addTo(map);

      // Start continuous tracking
      positionWatchId = navigator.geolocation.watchPosition(
        updateUserPosition,
        () => {},
        { enableHighAccuracy: true, maximumAge: 3000, timeout: 10000 }
      );
    },
    () => {
      // User denied location – drawing still works, voice will just show alert
    }
  );
}
</script>
</body>
</html>
