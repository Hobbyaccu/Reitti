<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Draw My Walk - Fixed</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.css" />

  <style>
    body { margin:0; padding:0; font-family: system-ui, sans-serif; background:#111; color:#fff; }
    #map { position:absolute; top:0; bottom:0; left:0; right:0; }
    #controls {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.85);
      padding: 12px 18px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      z-index: 1000;
      text-align: center;
      max-width: 92%;
    }
    button, input[type="range"] {
      font-size: 1.1em;
      padding: 12px 20px;
      margin: 6px;
      border-radius: 12px;
      border: none;
      background: #e00;
      color: white;
      cursor: pointer;
    }
    button:active { background: #c00; }
    #info {
      display: none; 
      position: absolute;
      top: 12px;
      right: 12px;
      left: auto;
      background: rgba(0,0,0,0.85);
      padding: 14px;
      border-radius: 12px;
      font-size: 1.05em;
      z-index: 1000;
      max-width: 260px;
    }
    .leaflet-control { z-index: 999 !important; }
  </style>
</head>
<body>

<div id="map"></div>
<div id="info"></div>

<div id="controls">
  <button id="clearBtn">Clear Path</button>
  <button id="locateBtn">📍 Find Me</button>
  <button id="playBtn">▶️ Start Voice Guidance</button><br>
  <label>Walking speed: <span id="speedVal">4.5</span> km/h</label>
  <input type="range" id="speedSlider" min="2" max="7" step="0.1" value="4.5">
</div>

<audio id="keepAliveAudio" loop playsinline>
  <source src="data:audio/mp3;base64,//NExAAAAANIAAAAAExBTUUzLjEwMKqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqq//NExAAAAANIAAAAAExBTUUzLjEwMKqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqq" type="audio/mpeg">
</audio>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.js"></script>
<script src="https://unpkg.com/@turf/turf@7/turf.min.js"></script>

<script>
// ==================== VARIABLES ====================
const map = L.map('map', { zoomControl: false }).setView([51.5, -0.1], 13);
let currentLayer = null;
let turns = [];
let userMarker = null;
let positionWatchId = null;
let guidanceEnabled = false;
let announcedTurns = new Set();
let currentSpeed = 4.5;
let wakeLock = null;
let heartbeatInterval = null;

const playBtn = document.getElementById('playBtn');
const keepAliveAudio = document.getElementById('keepAliveAudio');

// ==================== MAP SETUP ====================
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap'
}).addTo(map);

L.control.zoom({ position: 'topright' }).addTo(map);

map.pm.addControls({
  position: 'topleft',
  drawMarker: false,
  drawPolyline: true,
  editMode: true,
  removalMode: true,
  dragMode: false,
  drawPolygon: false,
  drawCircle: false,
  drawRectangle: false
});

map.pm.setGlobalOptions({ snappable: true, snapDistance: 20 });

// ==================== UTILS & CLEANUP ====================
function clearExistingPath() {
  if (currentLayer) {
    map.removeLayer(currentLayer);
    currentLayer = null;
  }
  
  // CRITICAL: Disable Geoman drawing mode to prevent "broken" state
  map.pm.disableDraw();
  
  turns = [];
  announcedTurns = new Set();
  
  // Stop guidance if it's active
  if (guidanceEnabled) {
    toggleGuidance(false);
  }
  
  updateInfo();
}

function updateInfo() {
  const infoDiv = document.getElementById('info');
  if (!currentLayer) {
    infoDiv.style.display = 'none';
    return;
  }
  
  infoDiv.style.display = 'block';
  const latlngs = currentLayer.getLatLngs();
  if (latlngs.length < 2) return;

  const line = turf.lineString(latlngs.map(p => [p.lng, p.lat]));
  const km = turf.length(line, { units: 'kilometers' });
  const meters = Math.round(km * 1000);
  const minutes = Math.round((km / currentSpeed) * 60);

  infoDiv.innerHTML = `
    <strong>Path:</strong> ${meters} m (${km.toFixed(2)} km)<br>
    <strong>Est. Time:</strong> ${minutes} mins
  `;
}

// ==================== DRAWING LOGIC ====================
map.on('pm:create', e => {
  if (currentLayer && currentLayer !== e.layer) map.removeLayer(currentLayer);
  currentLayer = e.layer;
  analyzeTurns();
  updateInfo();
});

map.on('pm:edit', () => {
  analyzeTurns();
  updateInfo();
});

function analyzeTurns() {
  if (!currentLayer) return;
  const latlngs = currentLayer.getLatLngs();
  if (latlngs.length < 3) return;

  turns = [];
  announcedTurns = new Set();

  const points = latlngs.map(p => [p.lng, p.lat]);
  const line = turf.lineString(points);
  
  // Simplify helps with the "jagged" drawing feel
  const simplified = turf.simplify(line, { tolerance: 0.0001, highQuality: true });
  const coords = simplified.geometry.coordinates;

  for (let i = 1; i < coords.length - 1; i++) {
    const bearing1 = turf.bearing(coords[i-1], coords[i]);
    const bearing2 = turf.bearing(coords[i], coords[i+1]);
    let diff = (bearing2 - bearing1 + 540) % 360 - 180;

    if (Math.abs(diff) > 25) {
      const dir = diff > 0 ? 'right' : 'left';
      const intensity = Math.abs(diff) > 70 ? 'sharp' : 'slight';
      turns.push({
        lat: coords[i][1],
        lng: coords[i][0],
        text: `In 50 meters, ${intensity} turn ${dir}`
      });
    }
  }
}

// ==================== BACKGROUND & VOICE ====================
async function requestWakeLock() {
  if ('wakeLock' in navigator) {
    try { wakeLock = await navigator.wakeLock.request('screen'); } 
    catch (err) { console.warn('Wake Lock error:', err); }
  }
}

function startHeartbeat() {
  if (heartbeatInterval) clearInterval(heartbeatInterval);
  heartbeatInterval = setInterval(() => {
    if (guidanceEnabled) {
      keepAliveAudio.volume = keepAliveAudio.volume === 1 ? 0.99 : 1;
    }
  }, 10000);
}

async function toggleGuidance(forceOff = false) {
  if (guidanceEnabled || forceOff) {
    guidanceEnabled = false;
    playBtn.textContent = '▶️ Start Voice Guidance';
    keepAliveAudio.pause();
    clearInterval(heartbeatInterval);
    if (wakeLock) {
      await wakeLock.release();
      wakeLock = null;
    }
  } else {
    if (!currentLayer) return alert("Draw a path first!");
    if (!userMarker) return alert("Waiting for GPS...");

    guidanceEnabled = true;
    playBtn.textContent = '🔇 Stop Voice Guidance';
    
    await requestWakeLock();
    keepAliveAudio.play();
    startHeartbeat();
    
    const msg = new SpeechSynthesisUtterance("Guidance started. Keep screen on.");
    window.speechSynthesis.speak(msg);
  }
}

function checkForTurns(lat, lng) {
  const userPoint = turf.point([lng, lat]);
  turns.forEach((turn, i) => {
    if (announcedTurns.has(i)) return;
    const turnPoint = turf.point([turn.lng, turn.lat]);
    const distMeters = turf.distance(userPoint, turnPoint, { units: 'kilometers' }) * 1000;

    if (distMeters <= 60) {
      const u = new SpeechSynthesisUtterance(turn.text);
      window.speechSynthesis.speak(u);
      announcedTurns.add(i);
    }
  });
}

// ==================== EVENTS ====================
playBtn.addEventListener('click', () => toggleGuidance());

document.getElementById('clearBtn').addEventListener('click', clearExistingPath);

speedSlider.addEventListener('input', () => {
  currentSpeed = parseFloat(speedSlider.value);
  document.getElementById('speedVal').textContent = currentSpeed.toFixed(1);
  updateInfo();
});

document.getElementById('locateBtn').addEventListener('click', () => {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(pos => {
      map.flyTo([pos.coords.latitude, pos.coords.longitude], 16);
    });
  }
});

// GPS Initialization
if (navigator.geolocation) {
  navigator.geolocation.watchPosition(
    (pos) => {
      const latlng = L.latLng(pos.coords.latitude, pos.coords.longitude);
      if (!userMarker) {
        userMarker = L.marker(latlng).addTo(map);
        map.flyTo(latlng, 15);
      } else {
        userMarker.setLatLng(latlng);
      }
      if (guidanceEnabled) checkForTurns(pos.coords.latitude, pos.coords.longitude);
    },
    (err) => console.warn("GPS Error", err),
    { enableHighAccuracy: true }
  );
}
</script>
</body>
</html>
