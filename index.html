<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Draw My Walk • Voice Guide</title>
  
  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <!-- Geoman -->
  <link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.css" />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
    
    body { font-family: 'Inter', system_ui, sans-serif; }
    .title-font { font-family: 'Space Grotesk', sans-serif; }
    
    #map { position: absolute; inset: 0; z-index: 0; }
    
    .leaflet-popup-content-wrapper { border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
    .leaflet-popup-tip { background: #111; }
    
    .tail-container { display: none; }
    .user-dot {
      width: 28px;
      height: 28px;
      background: #3b82f6;
      border: 4px solid #fff;
      border-radius: 50%;
      box-shadow: 0 0 0 6px rgba(59, 130, 246, 0.4);
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 6px rgba(59, 130, 246, 0.4); }
      50% { box-shadow: 0 0 0 12px rgba(59, 130, 246, 0); }
    }
    
    .control-card {
      background: rgba(17, 17, 17, 0.92);
      backdrop-filter: blur(20px);
    }
  </style>
</head>
<body class="bg-zinc-950 text-white overflow-hidden">

  <!-- MAP -->
  <div id="map"></div>

  <!-- HEADER -->
  <div class="fixed top-6 left-1/2 -translate-x-1/2 z-[1100] bg-zinc-900/90 backdrop-blur-2xl px-8 py-4 rounded-3xl shadow-2xl flex items-center gap-x-3 border border-white/10">
    <div class="w-9 h-9 bg-gradient-to-br from-blue-500 to-emerald-500 rounded-2xl flex items-center justify-center text-2xl">🛤️</div>
    <div>
      <h1 class="title-font text-2xl font-semibold tracking-tighter">Draw My Walk</h1>
      <p class="text-xs text-zinc-400 -mt-1">Voice-guided navigation</p>
    </div>
  </div>

  <!-- NEXT TURN BANNER -->
  <div id="nextTurn" 
       class="hidden fixed top-28 left-1/2 -translate-x-1/2 z-[1200] px-8 py-5 rounded-3xl shadow-2xl text-white flex items-center gap-x-5 transition-all duration-300">
    <!-- JS injected -->
  </div>

  <!-- INFO PANEL -->
  <div id="infoPanel" 
       class="hidden fixed top-28 right-6 z-[1100] bg-zinc-900/90 backdrop-blur-2xl rounded-3xl shadow-2xl p-6 w-72 border border-white/10">
    <div class="flex justify-between items-start">
      <div>
        <div class="text-xs tracking-widest text-zinc-500 font-medium">TOTAL DISTANCE</div>
        <div id="totalDist" class="text-5xl font-semibold title-font tracking-tighter">0.0</div>
        <div class="text-sm text-zinc-400">km</div>
      </div>
      <div class="text-right">
        <div class="text-xs tracking-widest text-zinc-500 font-medium">EST. TIME</div>
        <div id="estTime" class="text-4xl font-semibold title-font">—</div>
        <div class="text-xs text-zinc-400">minutes</div>
      </div>
    </div>
    
    <!-- Progress -->
    <div id="progressContainer" class="hidden mt-6">
      <div class="flex justify-between text-xs mb-1">
        <div class="text-zinc-400">PROGRESS</div>
        <div id="progressText" class="font-medium">0%</div>
      </div>
      <div class="h-2 bg-zinc-800 rounded-2xl overflow-hidden">
        <div id="progressBar" class="h-full w-0 bg-gradient-to-r from-blue-500 to-emerald-500 rounded-2xl transition-all"></div>
      </div>
    </div>
  </div>

  <!-- BOTTOM CONTROLS -->
  <div class="fixed bottom-6 left-1/2 -translate-x-1/2 z-[1100] control-card rounded-3xl shadow-2xl p-6 w-[92%] max-w-md border border-white/10">
    
    <!-- Action buttons -->
    <div class="grid grid-cols-3 gap-3 mb-6">
      <button id="clearBtn"
              class="flex flex-col items-center justify-center py-3 bg-zinc-800 hover:bg-red-500/20 active:bg-red-500/30 rounded-2xl transition-all text-sm font-medium">
        <span class="text-2xl mb-1">🗑️</span>
        CLEAR
      </button>
      
      <button id="locateBtn"
              class="flex flex-col items-center justify-center py-3 bg-zinc-800 hover:bg-blue-500/20 active:bg-blue-500/30 rounded-2xl transition-all text-sm font-medium">
        <span class="text-2xl mb-1">📍</span>
        FIND ME
      </button>
      
      <button id="playBtn"
              class="flex flex-col items-center justify-center py-3 bg-emerald-600 hover:bg-emerald-700 active:bg-emerald-800 rounded-2xl transition-all text-sm font-medium font-semibold">
        <span id="playIcon" class="text-3xl mb-1">▶️</span>
        <span id="playText">START</span>
      </button>
    </div>

    <!-- Speed slider -->
    <div class="px-2">
      <div class="flex items-center justify-between mb-2">
        <div class="text-sm text-zinc-400">Walking speed</div>
        <div id="speedVal" class="font-mono text-xl font-semibold text-emerald-400">4.5</div>
      </div>
      <input type="range" id="speedSlider"
             min="2" max="8" step="0.1" value="4.5"
             class="w-full accent-emerald-500">
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" 
       class="hidden fixed bottom-28 left-1/2 -translate-x-1/2 bg-zinc-800 text-white text-sm px-6 py-3 rounded-2xl shadow-xl flex items-center gap-x-2 z-[1300]">
    <!-- JS injected -->
  </div>

  <!-- Scripts -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.js"></script>
  <script src="https://unpkg.com/@turf/turf@7/turf.min.js"></script>

  <script>
    // ============== TAILWIND INIT ==============
    function initTailwind() {
      // Already using static classes - no runtime config needed
    }

    // ============== STATE ==============
    let map;
    let currentLayer = null;
    let pathLine = null;
    let turns = [];
    let announcedTurns = new Set();
    let userMarker = null;
    let guidanceEnabled = false;
    let currentSpeed = 4.5;
    let wakeLock = null;
    let totalLengthKm = 0;
    let lastUserLat = null;
    let lastUserLng = null;

    // DOM elements
    const playBtn = document.getElementById('playBtn');
    const playText = document.getElementById('playText');
    const playIcon = document.getElementById('playIcon');
    const speedSlider = document.getElementById('speedSlider');
    const speedVal = document.getElementById('speedVal');
    const infoPanel = document.getElementById('infoPanel');
    const nextTurnBanner = document.getElementById('nextTurn');
    const toastEl = document.getElementById('toast');

    // ============== MAP SETUP ==============
    function initializeMap() {
      map = L.map('map', {
        zoomControl: false,
        attributionControl: false
      }).setView([51.505, -0.09], 13);

      // OSM tiles
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        className: 'map-tiles'
      }).addTo(map);

      // Zoom control
      L.control.zoom({
        position: 'topright'
      }).addTo(map);

      // Geoman drawing controls
      map.pm.addControls({
        position: 'topleft',
        drawMarker: false,
        drawCircle: false,
        drawRectangle: false,
        drawPolygon: false,
        drawPolyline: true,
        editMode: true,
        dragMode: false,
        cutPolygon: false,
        removalMode: true
      });

      map.pm.setGlobalOptions({
        snappable: true,
        snapDistance: 25,
        allowSelfIntersection: false
      });
    }

    // ============== UTILITIES ==============
    function showToast(message, duration = 2200) {
      toastEl.textContent = message;
      toastEl.classList.remove('hidden');
      toastEl.style.transform = 'translate(-50%, 0)';
      
      setTimeout(() => {
        toastEl.style.transform = 'translate(-50%, 80px)';
        setTimeout(() => toastEl.classList.add('hidden'), 300);
      }, duration);
    }

    function speak(text) {
      if (!('speechSynthesis' in window)) {
        console.warn('Speech synthesis not supported');
        return;
      }
      
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'en-GB';
      utterance.rate = 0.95;
      utterance.pitch = 1.05;
      utterance.volume = 0.95;
      
      // Cancel any ongoing speech
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(utterance);
    }

    // ============== PATH ANALYSIS ==============
    function analyzePath() {
      if (!currentLayer) return;
      
      const latlngs = currentLayer.getLatLngs();
      if (latlngs.length < 3) {
        turns = [];
        announcedTurns.clear();
        return;
      }

      // Convert to Turf format
      const coords = latlngs.map(p => [p.lng, p.lat]);
      let rawLine = turf.lineString(coords);
      
      // Simplify for clean turn detection
      const simplified = turf.simplify(rawLine, {
        tolerance: 0.00008,
        highQuality: true
      });
      
      const simpCoords = simplified.geometry.coordinates;
      pathLine = turf.lineString(simpCoords);
      totalLengthKm = turf.length(pathLine, { units: 'kilometers' });

      // Detect turns
      turns = [];
      announcedTurns.clear();

      for (let i = 1; i < simpCoords.length - 1; i++) {
        const b1 = turf.bearing(simpCoords[i - 1], simpCoords[i]);
        const b2 = turf.bearing(simpCoords[i], simpCoords[i + 1]);
        
        let diff = (b2 - b1 + 540) % 360 - 180;
        
        if (Math.abs(diff) > 28) {
          const turnCoord = simpCoords[i];
          
          // Distance along path to this turn
          const slice = turf.lineSlice(
            turf.point(simpCoords[0]),
            turf.point(turnCoord),
            pathLine
          );
          const alongKm = turf.length(slice, { units: 'kilometers' });

          turns.push({
            lat: turnCoord[1],
            lng: turnCoord[0],
            type: diff > 0 ? 'right' : 'left',
            alongKm: alongKm
          });
        }
      }

      updateInfoPanel();
      showToast(`${turns.length} turns detected`, 1800);
    }

    // ============== UI UPDATES ==============
    function updateInfoPanel() {
      if (!pathLine) {
        infoPanel.classList.add('hidden');
        return;
      }
      
      infoPanel.classList.remove('hidden');
      
      const kmRounded = totalLengthKm.toFixed(1);
      const minutes = Math.round((totalLengthKm / currentSpeed) * 60);
      
      document.getElementById('totalDist').textContent = kmRounded;
      document.getElementById('estTime').textContent = minutes;
    }

    function updateProgressAndNext(userAlongKm, userPoint) {
      // Progress
      const progressContainer = document.getElementById('progressContainer');
      if (totalLengthKm > 0) {
        const progressPercent = Math.min(100, Math.round((userAlongKm / totalLengthKm) * 100));
        document.getElementById('progressBar').style.width = `${progressPercent}%`;
        document.getElementById('progressText').textContent = `${progressPercent}%`;
        progressContainer.classList.remove('hidden');
      }

      // Find next turn
      let nextIndex = -1;
      for (let i = 0; i < turns.length; i++) {
        if (!announcedTurns.has(i) && turns[i].alongKm > userAlongKm - 0.06) {
          nextIndex = i;
          break;
        }
      }

      const banner = nextTurnBanner;

      if (nextIndex === -1) {
        banner.classList.add('hidden');
        return;
      }

      const nextTurn = turns[nextIndex];
      const turnPoint = turf.point([nextTurn.lng, nextTurn.lat]);
      const euclideanMeters = turf.distance(userPoint, turnPoint, { units: 'kilometers' }) * 1000;
      
      // Trigger audio
      if (euclideanMeters <= 42 && !announcedTurns.has(nextIndex)) {
        const message = nextTurn.type === 'left' ? 'Turn left!' : 'Turn right!';
        speak(message);
        announcedTurns.add(nextIndex);
      }

      // Update banner
      const distToNext = Math.max(0, Math.round((nextTurn.alongKm - userAlongKm) * 1000));
      
      const isLeft = nextTurn.type === 'left';
      banner.className = `flex items-center gap-x-5 px-8 py-5 rounded-3xl shadow-2xl text-white transition-all duration-300 z-[1200] fixed top-28 left-1/2 -translate-x-1/2 ${
        isLeft ? 'bg-blue-600' : 'bg-amber-600'
      }`;
      
      banner.innerHTML = `
        <div class="text-6xl">${isLeft ? '⬅️' : '➡️'}</div>
        <div>
          <div class="text-4xl font-bold tracking-tighter">${nextTurn.type.toUpperCase()} TURN</div>
          <div class="text-xl opacity-90 font-medium">in ${distToNext} m</div>
        </div>
      `;
      
      banner.classList.remove('hidden');
    }

    // ============== GUIDANCE ENGINE ==============
    function processUserPosition(lat, lng) {
      if (!pathLine || !guidanceEnabled) return;
      
      const userPoint = turf.point([lng, lat]);
      
      // Snap user to path
      const snapped = turf.nearestPointOnLine(pathLine, userPoint);
      
      // Distance traveled along path
      const startPoint = turf.point(pathLine.geometry.coordinates[0]);
      const traveledSlice = turf.lineSlice(startPoint, snapped, pathLine);
      const userAlongKm = turf.length(traveledSlice, { units: 'kilometers' });

      updateProgressAndNext(userAlongKm, userPoint);
    }

    async function toggleGuidance() {
      if (guidanceEnabled) {
        // STOP
        guidanceEnabled = false;
        nextTurnBanner.classList.add('hidden');
        document.getElementById('progressContainer').classList.add('hidden');
        
        if (wakeLock) {
          try { await wakeLock.release(); } catch (e) {}
          wakeLock = null;
        }
        
        playIcon.textContent = '▶️';
        playText.textContent = 'START';
        playBtn.classList.remove('!bg-red-600');
        
        showToast('Guidance stopped', 1200);
      } 
      else {
        // START
        if (!pathLine) {
          showToast('Draw a path first!', 2000);
          return;
        }
        
        guidanceEnabled = true;
        
        // Request screen wake lock
        if ('wakeLock' in navigator) {
          try {
            wakeLock = await navigator.wakeLock.request('screen');
          } catch (e) {
            console.log('Wake Lock not available');
          }
        }
        
        // Voice confirmation
        setTimeout(() => {
          if (guidanceEnabled) speak('Voice guidance activated');
        }, 420);
        
        playIcon.textContent = '⏹️';
        playText.textContent = 'STOP';
        playBtn.classList.add('!bg-red-600');
        
        showToast('Following your path...', 1600);
      }
    }

    function clearPath() {
      if (currentLayer) {
        map.removeLayer(currentLayer);
        currentLayer = null;
      }
      
      pathLine = null;
      turns = [];
      announcedTurns.clear();
      totalLengthKm = 0;
      
      infoPanel.classList.add('hidden');
      nextTurnBanner.classList.add('hidden');
      document.getElementById('progressContainer').classList.add('hidden');
      
      if (guidanceEnabled) toggleGuidance();
      
      showToast('Path cleared', 1400);
    }

    // ============== EVENT LISTENERS ==============
    function setupListeners() {
      // Speed slider
      speedSlider.addEventListener('input', (e) => {
        currentSpeed = parseFloat(e.target.value);
        speedVal.textContent = currentSpeed.toFixed(1);
        updateInfoPanel();
      });

      // Clear button
      document.getElementById('clearBtn').addEventListener('click', clearPath);

      // Locate me
      document.getElementById('locateBtn').addEventListener('click', () => {
        if (!navigator.geolocation) {
          showToast('GPS not supported', 1800);
          return;
        }
        
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            const latlng = [pos.coords.latitude, pos.coords.longitude];
            map.flyTo(latlng, 17, { duration: 1.2 });
            if (userMarker) userMarker.setLatLng(latlng);
          },
          () => showToast('Could not get location', 1800),
          { enableHighAccuracy: true }
        );
      });

      // Play / Stop
      playBtn.addEventListener('click', toggleGuidance);

      // Geoman events
      map.on('pm:create', (e) => {
        if (currentLayer && currentLayer !== e.layer) {
          map.removeLayer(currentLayer);
        }
        currentLayer = e.layer;
        analyzePath();
      });

      map.on('pm:edit', () => {
        if (currentLayer) analyzePath();
      });

      // Keyboard shortcut: Escape to clear
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && currentLayer) {
          clearPath();
        }
      });
    }

    // ============== GPS TRACKING ==============
    function startGPS() {
      if (!navigator.geolocation) {
        showToast('GPS unavailable on this device', 3000);
        return;
      }

      navigator.geolocation.watchPosition(
        (position) => {
          const lat = position.coords.latitude;
          const lng = position.coords.longitude;
          
          lastUserLat = lat;
          lastUserLng = lng;

          // Create or update user marker
          if (!userMarker) {
            const dotIcon = L.divIcon({
              className: 'custom-user-dot',
              html: `<div class="user-dot mx-auto"></div>`,
              iconSize: [28, 28],
              iconAnchor: [14, 14]
            });
            
            userMarker = L.marker([lat, lng], { icon: dotIcon }).addTo(map);
            map.flyTo([lat, lng], 16, { duration: 1.8 });
          } else {
            userMarker.setLatLng([lat, lng]);
          }

          // Process guidance if active
          if (guidanceEnabled && pathLine) {
            processUserPosition(lat, lng);
          }
        },
        (err) => {
          console.warn('GPS error:', err);
          if (err.code === 1) showToast('Location permission denied');
        },
        {
          enableHighAccuracy: true,
          maximumAge: 4000,
          timeout: 8000
        }
      );
    }

    // ============== INITIALIZATION ==============
    async function initializeApp() {
      // Tailwind ready
      initTailwind();
      
      // Map
      initializeMap();
      
      // Listeners
      setupListeners();
      
      // GPS
      startGPS();
      
      // Keyboard hint
      setTimeout(() => {
        showToast('Draw with the pencil tool →', 2800);
      }, 1200);
      
      // Demo hint on first load
      console.log('%c✅ Draw My Walk ready. Draw a path and tap START.', 'color:#22c55e; font-size:13px');
    }

    // Boot app
    window.onload = initializeApp;
  </script>
</body>
</html>
