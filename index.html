<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Draw My Walk - MP3 Edition</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.css" />

  <style>
    body { margin:0; padding:0; font-family: system-ui, sans-serif; background:#111; color:#fff; }
    #map { position:absolute; top:0; bottom:0; left:0; right:0; }
    #controls {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.85);
      padding: 12px 18px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      z-index: 1000;
      text-align: center;
      max-width: 92%;
    }
    button, input[type="range"] {
      font-size: 1.1em;
      padding: 12px 20px;
      margin: 6px;
      border-radius: 12px;
      border: none;
      background: #e00;
      color: white;
      cursor: pointer;
    }
    button:active { background: #c00; }
    #info {
      display: none; 
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(0,0,0,0.85);
      padding: 14px;
      border-radius: 12px;
      font-size: 1.05em;
      z-index: 1000;
      max-width: 260px;
    }
    .leaflet-control { z-index: 999 !important; }
  </style>
</head>
<body>

<div id="map"></div>
<div id="info"></div>

<div id="controls">
  <button id="clearBtn">Clear Path</button>
  <button id="locateBtn">📍 Find Me</button>
  <button id="playBtn">▶️ Start Audio Guidance</button><br>
  <label>Walking speed: <span id="speedVal">4.5</span> km/h</label>
  <input type="range" id="speedSlider" min="2" max="7" step="0.1" value="4.5">
</div>

<audio id="keepAliveAudio" loop playsinline src="data:audio/wav;base64,UklGRigAAABXQVZFWm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA="></audio>
<audio id="audioLeft" playsinline src="Left.mp3"></audio>
<audio id="audioRight" playsinline src="Right.mp3"></audio>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.js"></script>
<script src="https://unpkg.com/@turf/turf@7/turf.min.js"></script>

<script>
// ==================== STATE ====================
const map = L.map('map', { zoomControl: false }).setView([51.5, -0.1], 13);
let currentLayer = null;
let turns = [];
let userMarker = null;
let guidanceEnabled = false;
let announcedTurns = new Set();
let currentSpeed = 4.5;
let wakeLock = null;

const playBtn = document.getElementById('playBtn');
const audioLeft = document.getElementById('audioLeft');
const audioRight = document.getElementById('audioRight');
const keepAliveAudio = document.getElementById('keepAliveAudio');
const delay = (ms) => new Promise(resolve => setTimeout(resolve, ms));

// ==================== MAP & GEOMAN ====================
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
L.control.zoom({ position: 'topright' }).addTo(map);

map.pm.addControls({
  position: 'topleft',
  drawMarker: false,
  drawPolyline: true,
  editMode: true,
  removalMode: true,
  dragMode: false
});

map.pm.setGlobalOptions({ snappable: true, snapDistance: 20 });

// ==================== CORE FUNCTIONS ====================

function clearPath() {
  if (currentLayer) map.removeLayer(currentLayer);
  currentLayer = null;
  map.pm.disableDraw();
  turns = [];
  announcedTurns = new Set();
  if (guidanceEnabled) toggleGuidance(true);
  updateInfo();
}

function updateInfo() {
  const infoDiv = document.getElementById('info');
  if (!currentLayer) { infoDiv.style.display = 'none'; return; }
  
  infoDiv.style.display = 'block';
  const latlngs = currentLayer.getLatLngs();
  if (latlngs.length < 2) return;

  const line = turf.lineString(latlngs.map(p => [p.lng, p.lat]));
  const km = turf.length(line, { units: 'kilometers' });
  const minutes = Math.round((km / currentSpeed) * 60);

  infoDiv.innerHTML = `<strong>Dist:</strong> ${Math.round(km*1000)}m<br><strong>Time:</strong> ${minutes} mins`;
}

function analyzeTurns() {
  if (!currentLayer) return;
  const latlngs = currentLayer.getLatLngs();
  if (latlngs.length < 3) return;

  turns = [];
  announcedTurns = new Set();
  const coords = latlngs.map(p => [p.lng, p.lat]);
  const line = turf.simplify(turf.lineString(coords), { tolerance: 0.0001, highQuality: true });
  const simplified = line.geometry.coordinates;

  for (let i = 1; i < simplified.length - 1; i++) {
    const b1 = turf.bearing(simplified[i-1], simplified[i]);
    const b2 = turf.bearing(simplified[i], simplified[i+1]);
    let diff = (b2 - b1 + 540) % 360 - 180;

    if (Math.abs(diff) > 25) {
      turns.push({
        lat: simplified[i][1],
        lng: simplified[i][0],
        type: diff > 0 ? 'right' : 'left'
      });
    }
  }
}

// ==================== GUIDANCE & BACKGROUND ====================

async function toggleGuidance(forceOff = false) {

  await delay(1000);
  
  if (guidanceEnabled || forceOff) {
    guidanceEnabled = false;
    playBtn.textContent = '▶️ Start Audio Guidance';
    keepAliveAudio.pause();
    if (wakeLock) { await wakeLock.release(); wakeLock = null; }
  } else {
    if (!currentLayer) return alert("Draw a path first!");
    
    // Unlock Audio for Mobile
    audioLeft.play(); audioLeft.pause(); 
    audioRight.play(); audioRight.pause();
    keepAliveAudio.play();

    guidanceEnabled = true;
    playBtn.textContent = '🔇 Stop Audio Guidance';
    
    if ('wakeLock' in navigator) {
      try { wakeLock = await navigator.wakeLock.request('screen'); } catch(e) {}
    }
  }
}

function checkForTurns(lat, lng) {
  const userP = turf.point([lng, lat]);
  turns.forEach((turn, i) => {
    if (announcedTurns.has(i)) return;
    const turnP = turf.point([turn.lng, turn.lat]);
    const dist = turf.distance(userP, turnP, { units: 'kilometers' }) * 1000;

    if (dist <= 40) { // Trigger 40 meters before the point
      if (turn.type === 'left') audioLeft.play();
      else audioRight.play();
      announcedTurns.add(i);
    }
  });
}

// ==================== LISTENERS ====================

playBtn.addEventListener('click', async () => await toggleGuidance());

document.getElementById('clearBtn').addEventListener('click', clearPath);

document.getElementById('speedSlider').addEventListener('input', (e) => {
  currentSpeed = parseFloat(e.target.value);
  document.getElementById('speedVal').textContent = currentSpeed.toFixed(1);
  updateInfo();
});

document.getElementById('locateBtn').addEventListener('click', () => {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(pos => {
      map.flyTo([pos.coords.latitude, pos.coords.longitude], 16);
    });
  }
});

map.on('pm:create', e => {
  if (currentLayer && currentLayer !== e.layer) map.removeLayer(currentLayer);
  currentLayer = e.layer;
  analyzeTurns();
  updateInfo();
});

map.on('pm:edit', () => { analyzeTurns(); updateInfo(); });

// Start GPS
if (navigator.geolocation) {
  navigator.geolocation.watchPosition(
    (pos) => {
      const latlng = [pos.coords.latitude, pos.coords.longitude];
      if (!userMarker) {
        userMarker = L.marker(latlng).addTo(map);
        map.flyTo(latlng, 15);
      } else {
        userMarker.setLatLng(latlng);
      }
      if (guidanceEnabled) checkForTurns(pos.coords.latitude, pos.coords.longitude);
    },
    null,
    { enableHighAccuracy: true }
  );
}
</script>
</body>
</html>
