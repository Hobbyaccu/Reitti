<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <link rel="manifest" href="manifest.json?v=14">
    <title>WIP Nav</title>
    <link rel="stylesheet" href="style.css?v=14">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>

<body>
    <header id="floating-header">
        <h1>Nav</h1>
        <div class="header-actions" style="display: flex; align-items: center; gap: 10px;">
            <button onclick="findMe()" id="findme-btn" class="icon-btn" aria-label="Find Me">📍</button>
            <button onclick="toggleLayers()" id="layers-btn" class="icon-btn" aria-label="Map Layers">🗺️</button>
        </div>
    </header>

    <div id="map"></div>

    <div id="bottom-panel">

        <div id="state-idle" class="state-view active">
            <button onclick="startDrawing()" class="btn primary-btn">✏️ Draw New Path</button>
            <button onclick="loadSavedPath()" id="load-btn" class="btn secondary-btn" style="display: none;">📂 Load
                Saved Path</button>
        </div>

        <div id="state-drawing" class="state-view">
            <div class="pill-instruction">Tap the map to add points</div>
            <div class="btn-row">
                <button onclick="clearEverything()" class="btn danger-icon-btn">✖️</button>
                <button onclick="undoLastPoint()" id="undo-btn" class="btn secondary-btn" disabled>↩️ Undo</button>
                <button onclick="finishDrawing()" id="finish-btn" class="btn primary-btn" disabled>✅ Finish</button>
            </div>
        </div>

        <div id="state-ready" class="state-view">
            <div class="route-summary">
                <span class="route-badge">📍 Route Ready</span>
                <span id="route-distance" class="route-dist">0.00 km</span>
            </div>
            <div class="btn-row">
                <button onclick="clearPath()" class="btn secondary-btn">🗑️ Clear</button>
                <button onclick="enterEditMode()" class="btn secondary-btn">✏️ Edit Path</button>
                <button onclick="startNavigation()" class="btn nav-btn">🧭 Start Navigating</button>
            </div>
        </div>

        <div id="state-editing" class="state-view">
            <div class="pill-instruction">Drag the blue dots to edit • Tap Undo to revert</div>
            <div class="btn-row">
                <button onclick="undoEdit()" id="edit-undo-btn" class="btn secondary-btn">↩️ Undo</button>
                <button onclick="cancelEditing()" class="btn secondary-btn">Cancel</button>
                <button onclick="finishEditing()" class="btn primary-btn">✅ Done Editing</button>
            </div>
        </div>

        <div id="state-navigating" class="state-view">
            <div id="path-info-content" class="nav-dashboard">
            </div>
            <button onclick="stopNavigation()" class="btn danger-btn">⏹️ Stop Navigation</button>
        </div>

    </div>

    <!-- Map Layers Modal -->
    <div id="layers-panel" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.65); z-index: 10000; align-items: center; justify-content: center;">
        <div onclick="event.stopImmediatePropagation()" style="background: #ffffff; border-radius: 20px; width: 92%; max-width: 340px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); overflow: hidden; max-height: 85vh;">
            
            <div style="padding: 18px 22px; border-bottom: 1px solid #e5e5e5; display: flex; align-items: center; justify-content: space-between;">
                <h3 style="margin: 0; font-size: 1.35rem; font-weight: 600;">🗺️ Map Layers</h3>
                <button onclick="toggleLayers()" style="background: none; border: none; font-size: 28px; line-height: 1; padding: 4px 10px; cursor: pointer;">✕</button>
            </div>

            <div id="layer-list" style="padding: 12px 8px; max-height: 58vh; overflow-y: auto;"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js?v=14"></script>
</body>

</html>
